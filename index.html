<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 관리 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBt9S_eiZXXIpQLjpx8rFgoJeTsy90J5zA",
    authDomain: "cwzip-ddfa5.firebaseapp.com",
    projectId: "cwzip-ddfa5",
    storageBucket: "cwzip-ddfa5.firebasestorage.app",
    messagingSenderId: "886233389665",
    appId: "1:886233389665:web:74c1bb0385cabfa8de2820"
  };

  firebase.initializeApp(firebaseConfig);
  const _db = firebase.firestore();
  const _REF = _db.collection('app').doc('data');

  window._fbLoad = async function() {
    try {
      const snap = await _REF.get();
      return snap.exists ? snap.data().records || [] : [];
    } catch(e) { console.error('Firebase 불러오기 실패:', e); return []; }
  };

  window._fbSave = async function(data) {
    try {
      await _REF.set({ records: data });
    } catch(e) { console.error('Firebase 저장 실패:', e); }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --mint: #52c997;
  --mint-dark: #3aaa7f;
  --mint-light: #edfaf4;
  --mint-border: #b6e8d2;
  --mint-soft: #f6fdf9;
  --coral: #ff8080;
  --coral-light: #fff3f3;
  --coral-border: #ffc4c4;
  --sky: #63b3ed;
  --sky-light: #ebf8ff;
  --sky-border: #bee3f8;
  --text: #2d4a3e;
  --sub: #7a9e8e;
  --bg: #f2faf6;
  --white: #ffffff;
  --border: #d8eed9;
  --shadow: 0 2px 12px rgba(82,201,151,0.08);
  --shadow-md: 0 6px 24px rgba(82,201,151,0.14);
  --r: 18px;
  --r-sm: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); }
button { font-family: inherit; cursor: pointer; border: none; background: none; }

/* ── LAYOUT ── */
#app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── HEADER ── */
header {
  background: white;
  color: var(--text); padding: 0 22px; height: 58px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; border-bottom: 1.5px solid var(--border);
  box-shadow: 0 2px 8px rgba(82,201,151,0.08);
}
header h1 { font-size: 17px; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; color: #2d4a3e; }
header h1::before { content: '🌿'; font-size: 18px; }
.header-right { display: flex; gap: 8px; }
.hbtn {
  display: flex; align-items: center; gap: 5px; padding: 7px 13px;
  border-radius: 99px; font-size: 12px; font-weight: 600; color: var(--sub);
  background: var(--bg); border: 1.5px solid var(--border);
  transition: all 0.15s;
}
.hbtn:hover { border-color: var(--mint); color: var(--mint-dark); background: var(--mint-light); }

/* ── TABS ── */
nav {
  display: flex; background: white; border-bottom: 1.5px solid var(--border);
  flex-shrink: 0; overflow-x: auto; padding: 0 6px;
}
.tab {
  display: flex; align-items: center; gap: 6px; padding: 13px 16px;
  font-size: 13px; font-weight: 600; color: var(--sub); white-space: nowrap;
  border-bottom: 3px solid transparent; transition: all 0.2s; border-radius: 0;
}
.tab:hover { color: var(--mint-dark); }
.tab.on { color: var(--mint-dark); border-bottom-color: var(--mint); }
.tab svg { width: 14px; height: 14px; }

/* ── CONTENT ── */
#content { flex: 1; overflow: auto; background: var(--bg); }
.pane { display: none; padding: 22px; max-width: 1100px; margin: 0 auto; }
.pane.on { display: block; }

/* ── CARDS ── */
.card { background: white; border-radius: var(--r); border: 1.5px solid var(--border); box-shadow: var(--shadow); }
.card-head { padding: 14px 18px; border-bottom: 1.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-body { padding: 18px; }
.card-title { font-size: 14px; font-weight: 700; }

/* ── STUDENT GRID ── */
.sgrid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
@media(max-width:700px){ .sgrid { grid-template-columns: repeat(4,1fr); } }
.sbtn {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  padding: 14px 8px; border-radius: var(--r-sm); height: 72px;
  background: var(--mint-soft); border: 1.5px solid var(--mint-border);
  color: var(--text); font-weight: 700; transition: all 0.18s;
  box-shadow: var(--shadow); position: relative;
}
.sbtn:hover { border-color: var(--mint); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(82,201,151,0.22); background: var(--mint-light); }
.sbtn.has { background: #d4f2e5; border-color: var(--mint); }
.sbtn .snum { font-size: 9px; color: var(--sub); font-weight: 500; }
.sbtn .sname { font-size: 15px; font-weight: 700; color: var(--text); font-family: 'Noto Sans KR', sans-serif; }
.sbtn .scnt {
  position: absolute; top: 5px; right: 6px;
  font-size: 9px; font-weight: 700;
  background: var(--mint-dark); color: white;
  border-radius: 99px; min-width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 4px; line-height: 1;
}

/* ── SEARCH ── */
.search { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: white; border: 1.5px solid var(--border); border-radius: 99px; margin-bottom: 14px; }
.search:focus-within { border-color: var(--mint); box-shadow: 0 0 0 3px rgba(62,207,142,0.12); }
.search input { flex: 1; border: none; outline: none; font-size: 13px; font-family: inherit; background: transparent; }
.search svg { width: 15px; height: 15px; color: var(--sub); flex-shrink: 0; }

/* ── BUTTONS ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 99px; font-size: 13px; font-weight: 600; font-family: inherit; transition: all 0.15s; border: none; cursor: pointer; }
.btn svg { width: 14px; height: 14px; }
.btn-primary { background: var(--mint); color: white; box-shadow: 0 3px 10px rgba(62,207,142,0.3); }
.btn-primary:hover { background: var(--mint-dark); box-shadow: 0 4px 14px rgba(62,207,142,0.4); }
.btn-ghost { background: white; color: var(--text); border: 1.5px solid var(--border); }
.btn-ghost:hover { border-color: var(--mint); color: var(--mint-dark); }
.btn-danger { background: var(--coral-light); color: var(--coral); border: 1.5px solid var(--coral-border); }
.btn-danger:hover { background: #ffe0e0; }
.btn-blue { background: var(--sky-light); color: var(--sky); border: 1.5px solid var(--sky-border); }
.btn-blue:hover { background: #ddf0ff; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-icon { padding: 7px; border-radius: 50%; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── MODAL ── */
.overlay {
  display: none; position: fixed; inset: 0; background: rgba(45,55,72,0.35);
  backdrop-filter: blur(4px); z-index: 100;
  align-items: center; justify-content: center; padding: 20px;
}
.overlay.open { display: flex; animation: fadeIn 0.15s ease; }
.mbox { background: white; border-radius: 20px; width: 100%; max-width: 460px; box-shadow: var(--shadow-md); animation: slideUp 0.2s ease; overflow: hidden; }
.mhead { padding: 20px 24px 15px; border-bottom: 1.5px solid var(--border); }
.mbody { padding: 20px 24px; }
.mfoot { padding: 15px 24px; border-top: 1.5px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
.mhead h3 { font-size: 16px; font-weight: 800; }
.mhead p { font-size: 12px; color: var(--sub); margin-top: 4px; }
textarea {
  width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 12px;
  font-size: 13px; font-family: inherit; resize: none; outline: none;
  line-height: 1.7; transition: border 0.2s; background: var(--bg);
}
textarea:focus { border-color: var(--mint); box-shadow: 0 0 0 3px rgba(62,207,142,0.12); background: white; }
input[type=text] {
  padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 99px;
  font-size: 13px; font-family: inherit; outline: none; transition: border 0.2s; background: white;
}
input[type=text]:focus { border-color: var(--mint); box-shadow: 0 0 0 3px rgba(62,207,142,0.12); }

/* ── HOMEWORK ── */
.hw-card { border: 1.5px solid var(--border); border-radius: var(--r); background: white; box-shadow: var(--shadow); overflow: hidden; animation: slideUp 0.2s ease; }
.hw-head { padding: 14px 18px; border-bottom: 1.5px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.hw-title { font-size: 15px; font-weight: 800; color: var(--text); }
.hw-meta { font-size: 12px; color: var(--sub); margin-top: 3px; }
.hw-bar { height: 5px; background: var(--bg); border-radius: 99px; overflow: hidden; margin-top: 9px; }
.hw-fill { height: 100%; border-radius: 99px; background: var(--mint); transition: width 0.4s ease; }
.hw-incomplete { padding: 8px 18px; background: var(--coral-light); border-bottom: 1.5px solid var(--coral-border); font-size: 12px; color: var(--coral); font-weight: 600; }
.cgrid { display: grid; grid-template-columns: repeat(12, 1fr); }
.cell {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 10px 4px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.12s; font-family: inherit; background: white;
}
.cell:hover { background: var(--mint-light); }
.cell.done { background: var(--mint-light); }
.cell-num { font-size: 10px; color: var(--sub); }
.cell-name { font-size: 12px; font-weight: 700; color: var(--text); }
.dot { width: 18px; height: 18px; border-radius: 50%; margin-top: 2px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; transition: all 0.15s; }
.dot.done { background: var(--mint); color: white; }
.dot.no { background: var(--border); }

/* ── PRESENTATION ── */
#pres {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: linear-gradient(145deg, #1a1f2e 0%, #2d3561 60%, #1a1f2e 100%);
  flex-direction: column; align-items: center; justify-content: center; padding: 40px;
}
#pres.open { display: flex; }
#pres-sub { font-size: 13px; color: rgba(255,255,255,0.35); font-weight: 600; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 28px; }
#pres-empty { font-size: 28px; font-weight: 700; color: white; text-align: center; }
#pres-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; width: 100%; max-width: 900px; max-height: 55vh; overflow-y: auto; }
.pres-card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 14px; text-align: center; cursor: pointer; transition: all 0.15s; }
.pres-card:hover { background: rgba(255,255,255,0.18); transform: scale(1.04); }
.pres-card.removing { animation: fadeOut 0.3s ease forwards; }
@keyframes fadeOut { to { opacity: 0; transform: scale(0.85); } }
.pres-card .pnum { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.5); }
.pres-card .pname { font-size: 20px; font-weight: 800; color: white; margin-top: 2px; }
#pres-close { margin-top: 28px; padding: 10px 28px; border-radius: 99px; font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); cursor: pointer; font-family: inherit; transition: all 0.15s; }
#pres-close:hover { background: rgba(255,255,255,0.15); color: white; }
[contenteditable] { outline: none; cursor: text; }
[contenteditable]:hover { background: rgba(255,255,255,0.05); border-radius: 8px; }
[contenteditable]:focus { background: rgba(255,255,255,0.08); border-radius: 8px; box-shadow: 0 0 0 2px rgba(255,255,255,0.2); }
#pres-notice { font-size: 18px; font-weight: 600; color: rgba(255,255,255,0.6); margin-bottom: 20px; min-width: 200px; text-align: center; padding: 6px 16px; border-radius: 8px; }
#pres-notice:empty:before { content: '+ 공지사항 클릭해서 입력'; color: rgba(255,255,255,0.25); font-weight: 400; }
#pres-hw { font-size: 42px; font-weight: 900; color: white; margin-bottom: 4px; text-align: center; padding: 6px 16px; border-radius: 8px; }
.pres-edit-hint { font-size: 11px; color: rgba(255,255,255,0.2); margin-top: 4px; }

/* ── REVIEW ── */
.rec-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; border-bottom: 1.5px solid var(--border); }
.rec-item:last-child { border-bottom: none; }
.rec-date { flex-shrink: 0; background: var(--bg); border: 1.5px solid var(--border); border-radius: 99px; padding: 3px 10px; font-size: 11px; font-weight: 600; color: var(--sub); }
.rec-text { flex: 1; font-size: 13px; line-height: 1.7; }

/* ── AI PANEL ── */
.ai-panel { border: 1.5px solid var(--sky-border); border-radius: var(--r-sm); background: var(--sky-light); padding: 14px; }
.ai-result { font-size: 13px; line-height: 1.8; color: #1a4a6e; white-space: pre-wrap; }

/* ── MONTHLY ── */
.mtable { width: 100%; border-collapse: collapse; font-size: 12px; }
.mtable th, .mtable td { padding: 8px 10px; border: 1px solid var(--border); text-align: center; }
.mtable th { background: var(--bg); font-weight: 700; color: var(--sub); font-size: 11px; }
.mtable td:first-child { text-align: left; font-weight: 600; position: sticky; left: 0; background: white; z-index: 1; }
.mtable tr:hover td { background: var(--mint-light) !important; }
.ck { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; font-weight: 800; }
.ck.ok { background: #c8f5e2; color: #2bb57a; }
.ck.no { background: var(--coral-light); color: var(--coral); }

/* ── CHIPS ── */
.chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 11px; border-radius: 99px; font-size: 11px; font-weight: 700; }
.chip-g { background: #c8f5e2; color: #2bb57a; }
.chip-r { background: var(--coral-light); color: var(--coral); }
.chip-b { background: var(--sky-light); color: var(--sky); }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 40px 20px; color: var(--sub); }
.empty svg { width: 36px; height: 36px; margin: 0 auto 10px; opacity: 0.25; display: block; }
.empty p { font-size: 13px; }

/* ── TOAST ── */
#toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: #2d3748; color: white; padding: 10px 20px; border-radius: 99px; font-size: 13px; font-weight: 600; box-shadow: var(--shadow-md); z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.25s; white-space: nowrap; }
#toast.show { opacity: 1; }

/* ── SPINNER ── */
.spin { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

select { padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 99px; font-size: 13px; font-family: inherit; outline: none; background: white; }
select:focus { border-color: var(--mint); }
.divider { height: 1px; background: var(--border); margin: 14px 0; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:10px;">
      <svg width="22" height="22" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <h1>학생 관리 시스템</h1>
    </div>
    <div class="header-right">
      <span id="hdate" style="font-size:12px;opacity:0.7;align-self:center;"></span>
      <button class="hbtn" onclick="exportExcel()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        엑셀 내보내기
      </button>
    </div>
  </header>

  <nav>
    <button class="tab on" data-tab="behavior">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/></svg>
      행동 기록
    </button>
    <button class="tab" data-tab="homework">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      숙제 확인
    </button>
    <button class="tab" data-tab="review">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      기록 조회
    </button>
    <button class="tab" data-tab="monthly">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      숙제 현황
    </button>
  </nav>

  <div id="content">

    <!-- 행동 기록 -->
    <div class="pane on" id="pane-behavior">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div>
          <h2 style="font-size:17px;font-weight:800;">행동 기록</h2>
          <p style="font-size:12px;color:var(--sub);margin-top:2px;">학생을 클릭하여 행동을 기록하세요</p>
        </div>
        <div id="b-stats" style="display:flex;gap:6px;"></div>
      </div>
      <div class="search">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="b-search" placeholder="이름 또는 번호 검색...">
      </div>
      <div class="card">
        <div class="card-body">
          <div class="sgrid" id="b-grid"></div>
        </div>
      </div>
    </div>

    <!-- 숙제 확인 -->
    <div class="pane" id="pane-homework">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <h2 style="font-size:17px;font-weight:800;">숙제 확인</h2>
        <button class="btn btn-blue" onclick="openAllPres()">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14" height="14"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          전체 미제출 보기
        </button>
      </div>
      <div class="card" style="margin-bottom:14px;">
        <div class="card-body" style="display:flex;gap:8px;">
          <input type="text" id="hw-input" placeholder="숙제 입력 (예: 수학 p.23 풀기)" style="flex:1;">
          <button class="btn btn-primary" id="hw-add-btn" onclick="addHomework()">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            추가
          </button>
        </div>
      </div>
      <div id="hw-list" style="display:flex;flex-direction:column;gap:12px;"></div>
    </div>

    <!-- 조회 -->
    <div class="pane" id="pane-review">
      <!-- 목록 -->
      <div id="rv-list">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <div>

<script>
// ══════════════════════════════════════
// 학생 목록
// ══════════════════════════════════════
const STUDENTS = [
  {id:1,name:'고민우'},{id:2,name:'구도현'},{id:3,name:'김다현'},
  {id:4,name:'김라호'},{id:5,name:'김민영'},{id:6,name:'김빈'},
  {id:7,name:'김예원'},{id:8,name:'박민설'},{id:9,name:'박서하'},
  {id:10,name:'박세준'},{id:11,name:'박시후'},{id:12,name:'박지유'},
  {id:13,name:'박찬호'},{id:14,name:'선지니'},{id:15,name:'신민아'},
  {id:16,name:'신수호'},{id:17,name:'신아준'},{id:18,name:'어지윤'},
  {id:19,name:'연승기'},{id:20,name:'유현재'},{id:21,name:'유혜수'},
  {id:22,name:'윤권녕'},{id:23,name:'윤수아'},{id:24,name:'윤이준'},
  {id:25,name:'윤해주'},{id:26,name:'이동현'},{id:27,name:'이보영'},
  {id:28,name:'이서현'},{id:29,name:'이시아'},{id:30,name:'전예은'},
  {id:31,name:'정시우'},{id:32,name:'정정아'},{id:33,name:'조윤우'},
  {id:34,name:'허민'},{id:35,name:'허윤서'},{id:36,name:'현지호'}
];

// ══════════════════════════════════════
// 데이터 저장 (Firebase Firestore)
// ══════════════════════════════════════
let DB = [];

async function dbLoad() {
  try {
    DB = await window._fbLoad();
  } catch { DB = []; }
}

async function dbSave() {
  try {
    await window._fbSave(DB);
  } catch(e) {
    console.error('저장 실패:', e);
    toast('⚠ 저장에 실패했습니다.');
  }
}

// dummy — 구버전 호환용
{
}

function dbCreate(record) {
  const item = { ...record, _id: 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2) };
  DB.push(item);
  return item;
}

function dbUpdate(id, patch) {
  const i = DB.findIndex(d => d._id === id);
  if (i !== -1) DB[i] = { ...DB[i], ...patch };
}

function dbDelete(id) {
  DB = DB.filter(d => d._id !== id);
}

function dbGet(type, filter = {}) {
  return DB.filter(d => {
    if (d.type !== type) return false;
    for (const k in filter) if (d[k] !== filter[k]) return false;
    return true;
  });
}

// ══════════════════════════════════════
// 유틸
// ══════════════════════════════════════
function today() { return new Date().toISOString().split('T')[0]; }
function todayWithDay() {
  const d = new Date();
  const days = ['일', '월', '화', '수', '목', '금', '토'];
  return d.toISOString().split('T')[0] + ' (' + days[d.getDay()] + ')';
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function filterGrid(gridId, q) {
  document.querySelectorAll(`#${gridId} [data-id]`).forEach(btn => {
    if (!q) { btn.style.display = ''; return; }
    const match = btn.dataset.id.includes(q) || btn.dataset.name.includes(q);
    btn.style.display = match ? '' : 'none';
  });
}

// ══════════════════════════════════════
// 탭
// ══════════════════════════════════════
let currentTab = 'behavior';

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('on'));
    document.getElementById(`pane-${tab}`).classList.add('on');
    currentTab = tab;
    if (tab === 'behavior') renderBehavior();
    if (tab === 'homework') renderHomework();
    if (tab === 'review') renderReviewList();
    if (tab === 'monthly') renderMonthly();
  });
});

// ══════════════════════════════════════
// 행동 기록 탭
// ══════════════════════════════════════
function renderBehavior() {
  const behaviors = dbGet('behavior');
  const counts = {};
  behaviors.forEach(b => { counts[b.student_id] = (counts[b.student_id] || 0) + 1; });

  const grid = document.getElementById('b-grid');
  grid.innerHTML = STUDENTS.map(s => {
    const cnt = counts[s.id] || 0;
    return `<button class="sbtn" data-id="${s.id}" data-name="${s.name}" onclick="openModal(${s.id})">
      <span class="snum">${s.id}번</span>
      <span class="sname">${s.name}</span>
      ${cnt > 0 ? `<span class="scnt">${cnt}</span>` : ''}
    </button>`;
  }).join('');

  const withRec = Object.keys(counts).length;
  const total = behaviors.length;
  document.getElementById('b-stats').innerHTML = `
    <span class="chip chip-g">${withRec}명 기록</span>
    <span class="chip chip-b">총 ${total}건</span>
  `;
}

document.getElementById('b-search').addEventListener('input', e => filterGrid('b-grid', e.target.value.trim()));

// ══════════════════════════════════════
// 행동 기록 모달
// ══════════════════════════════════════
let modalStudentId = null;
let saving = false;

function openModal(sid) {
  modalStudentId = sid;
  const s = STUDENTS.find(x => x.id === sid);
  document.getElementById('m-name').textContent = `${s.id}번 ${s.name}`;
  document.getElementById('m-date').textContent = '📅 ' + new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
  document.getElementById('m-text').value = '';
  document.getElementById('b-modal').classList.add('open');
  setTimeout(() => document.getElementById('m-text').focus(), 80);
}

function closeModal() {
  document.getElementById('b-modal').classList.remove('open');
  modalStudentId = null;
}

async function saveBehavior() {
  if (saving) return;
  const content = document.getElementById('m-text').value.trim();
  if (!content) {
    const ta = document.getElementById('m-text');
    ta.style.borderColor = 'var(--red)';
    setTimeout(() => ta.style.borderColor = 'var(--border)', 1500);
    return;
  }

  saving = true;
  const btn = document.getElementById('m-save');
  const orig = btn.innerHTML;
  btn.innerHTML = '<span class="spin"></span> 저장 중...';
  btn.disabled = true;

  const s = STUDENTS.find(x => x.id === modalStudentId);
  dbCreate({ type: 'behavior', student_id: modalStudentId, student_name: s.name, content, date: today() });
  await dbSave();

  saving = false;
  btn.innerHTML = orig;
  btn.disabled = false;
  closeModal();
  renderBehavior();
  toast('✅ 기록이 저장되었습니다');
}

document.getElementById('b-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('b-modal')) closeModal();
});
document.getElementById('m-text').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') saveBehavior();
});

// ══════════════════════════════════════
// 숙제 탭
// ══════════════════════════════════════
async function addHomework() {
  const input = document.getElementById('hw-input');
  const name = input.value.trim();
  if (!name) return;
  const btn = document.getElementById('hw-add-btn');
  const orig = btn.innerHTML;
  btn.innerHTML = '<span class="spin"></span>';
  btn.disabled = true;

  dbCreate({ type: 'homework', hw_id: 'hw_' + Date.now(), content: name, date: todayWithDay() });
  await dbSave();

  btn.innerHTML = orig;
  btn.disabled = false;
  input.value = '';
  renderHomework();
  toast('📝 숙제가 추가되었습니다');
}

document.getElementById('hw-input').addEventListener('keydown', e => { if (e.key === 'Enter') addHomework(); });

function renderHomework() {
  const list = document.getElementById('hw-list');
  const items = dbGet('homework').sort((a, b) => b.date.localeCompare(a.date) || b._id.localeCompare(a._id));

  if (!items.length) {
    list.innerHTML = '<div class="card"><div class="empty"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2z"/></svg><p>숙제를 추가해주세요</p></div></div>';
    return;
  }

  list.innerHTML = items.map(hw => {
    const checks = dbGet('hw_check', { hw_id: hw.hw_id });
    const doneIds = new Set(checks.filter(c => c.checked).map(c => c.student_id));
    const done = doneIds.size;
    const total = STUDENTS.length;
    const pct = Math.round(done / total * 100);
    const incomplete = STUDENTS.filter(s => !doneIds.has(s.id));
    const allDone = done === total;

    return `<div class="hw-card" id="hwcard-${hw.hw_id}">
      <div class="hw-head">
        <div style="flex:1;min-width:0;">
          <div class="title-row" style="display:flex;align-items:center;gap:8px;">
            <span class="hw-title">${hw.content}</span>
            ${allDone ? '<span class="chip chip-g done-badge" style="font-size:10px;">✓ 완료</span>' : ''}
          </div>
          <div class="hw-meta">${hw.date} · ${done}/${total}명 (${pct}%)</div>
          <div class="hw-bar"><div class="hw-fill" style="width:${pct}%;background:${allDone ? 'var(--g1)' : 'var(--g3)'};"></div></div>
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0;">
          <button class="btn btn-blue btn-icon btn-sm" title="프레젠테이션" onclick="openPres('${hw.hw_id}','${hw.content.replace(/'/g,"\\'")}')">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="13" height="13"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          </button>
          <button class="btn btn-ghost btn-icon btn-sm" title="전체 완료" onclick="checkAll('${hw.hw_id}', this)">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="13" height="13"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          </button>
          <button class="btn btn-ghost btn-icon btn-sm" title="수정" onclick="editHomework('${hw._id}')">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="13" height="13"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn btn-danger btn-icon btn-sm" onclick="deleteHomework('${hw._id}')">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="13" height="13"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>
      ${incomplete.length > 0 ? `<div class="hw-incomplete">⚠ 미제출: ${incomplete.map(s => `${s.id}. ${s.name}`).join(' · ')}</div>` : ''}
      <div class="cgrid">
        ${STUDENTS.map((s, i) => {
          const isDone = doneIds.has(s.id);
          return `<button class="cell ${isDone ? 'done' : ''}" data-sid="${s.id}" onclick="toggleCheck('${hw.hw_id}', ${s.id}, '${s.name}', this)"
            style="${(i+1) % 9 === 0 ? 'border-right:none;' : ''}${i >= STUDENTS.length - (STUDENTS.length % 9 || 9) ? 'border-bottom:none;' : ''}">
            <span class="cell-num">${s.id}</span>
            <span class="cell-name">${s.name}</span>
            <div class="dot ${isDone ? 'done' : 'no'}">${isDone ? '✓' : ''}</div>
          </button>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

async function toggleCheck(hwId, sid, sname, btn) {
  const existing = DB.find(d => d.type === 'hw_check' && d.hw_id === hwId && d.student_id === sid);
  const newChecked = existing ? !existing.checked : true;

  if (existing) {
    dbUpdate(existing._id, { checked: newChecked });
  } else {
    dbCreate({ type: 'hw_check', hw_id: hwId, student_id: sid, student_name: sname, checked: true, date: today() });
  }

  // 해당 셀만 즉시 업데이트 (전체 재렌더링 없음)
  const dot = btn.querySelector('.dot');
  if (newChecked) {
    btn.classList.add('done');
    dot.classList.remove('no'); dot.classList.add('done');
    dot.textContent = '✓';
  } else {
    btn.classList.remove('done');
    dot.classList.remove('done'); dot.classList.add('no');
    dot.textContent = '';
  }

  // 미제출 목록 & 진행률만 업데이트
  updateHwCard(hwId);

  // 저장은 백그라운드에서
  dbSave();
}

function updateHwCard(hwId) {
  const hw = DB.find(d => d.type === 'homework' && d.hw_id === hwId);
  if (!hw) return;
  const checks = DB.filter(d => d.type === 'hw_check' && d.hw_id === hwId);
  const doneIds = new Set(checks.filter(c => c.checked).map(c => c.student_id));
  const done = doneIds.size;
  const total = STUDENTS.length;
  const pct = Math.round(done / total * 100);
  const incomplete = STUDENTS.filter(s => !doneIds.has(s.id));
  const allDone = done === total;

  const card = document.getElementById('hwcard-' + hwId);
  if (!card) return;

  // 진행률 텍스트
  const meta = card.querySelector('.hw-meta');
  if (meta) meta.textContent = `${hw.date} · ${done}/${total}명 (${pct}%)`;

  // 완료 뱃지
  const titleRow = card.querySelector('.title-row');
  if (titleRow) {
    const badge = titleRow.querySelector('.done-badge');
    if (allDone && !badge) {
      const b = document.createElement('span');
      b.className = 'chip chip-g done-badge';
      b.style.fontSize = '10px';
      b.textContent = '✓ 완료';
      titleRow.appendChild(b);
    } else if (!allDone && badge) {
      badge.remove();
    }
  }

  // 프로그레스 바
  const fill = card.querySelector('.hw-fill');
  if (fill) {
    fill.style.width = pct + '%';
    fill.style.background = allDone ? 'var(--g1)' : 'var(--g3)';
  }

  // 체크 셀 업데이트
  const cells = card.querySelectorAll('.cell');
  cells.forEach(cell => {
    const cellSid = Number(cell.getAttribute('data-sid'));
    const isDone = doneIds.has(cellSid);
    const dot = cell.querySelector('.dot');
    if (isDone) {
      cell.classList.add('done');
      if (dot) { dot.classList.add('done'); dot.classList.remove('no'); dot.textContent = '✓'; }
    } else {
      cell.classList.remove('done');
      if (dot) { dot.classList.remove('done'); dot.classList.add('no'); dot.textContent = ''; }
    }
  });

  // 미제출 목록 — 없으면 새로 만들고, 있으면 업데이트, 전원완료면 숨김
  let incEl = card.querySelector('.hw-incomplete');
  if (incomplete.length > 0) {
    if (!incEl) {
      incEl = document.createElement('div');
      incEl.className = 'hw-incomplete';
      // hw-head 바로 다음에 삽입
      const hwHead = card.querySelector('.hw-head');
      hwHead.insertAdjacentElement('afterend', incEl);
    }
    incEl.style.display = '';
    incEl.textContent = '⚠ 미제출: ' + incomplete.map(s => `${s.id}. ${s.name}`).join(' · ');
  } else {
    if (incEl) incEl.style.display = 'none';
  }
}

let checkingAll = false;
async function checkAll(hwId, btn) {
  if (checkingAll) return;
  checkingAll = true;

  // 현재 전체 완료 상태인지 확인
  const checks = DB.filter(d => d.type === 'hw_check' && d.hw_id === hwId);
  const doneIds = new Set(checks.filter(c => c.checked).map(c => c.student_id));
  const isAllDone = STUDENTS.every(s => doneIds.has(s.id));

  // 전체 완료면 전체 해제, 아니면 전체 완료
  const newChecked = !isAllDone;

  for (const s of STUDENTS) {
    const ex = DB.find(d => d.type === 'hw_check' && d.hw_id === hwId && d.student_id === s.id);
    if (!ex) {
      if (newChecked) dbCreate({ type: 'hw_check', hw_id: hwId, student_id: s.id, student_name: s.name, checked: true, date: today() });
    } else {
      dbUpdate(ex._id, { checked: newChecked });
    }
  }
  dbSave();

  checkingAll = false;
  renderHomework();
  toast(newChecked ? '✅ 전체 완료 처리되었습니다' : '↩ 전체 체크가 해제되었습니다');
}

let confirmCallback = null;

function showConfirm(msg, callback) {
  document.getElementById('confirm-msg').textContent = msg;
  confirmCallback = callback;
  document.getElementById('confirm-modal').classList.add('open');
}

function closeConfirm() {
  document.getElementById('confirm-modal').classList.remove('open');
  confirmCallback = null;
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('confirm-ok-btn').addEventListener('click', () => {
    closeConfirm();
    if (confirmCallback) confirmCallback();
  });
});

function editHomework(id) {
  const hw = DB.find(d => d._id === id);
  if (!hw) return;

  const card = document.getElementById('hwcard-' + hw.hw_id);
  const titleEl = card.querySelector('.hw-title');
  const orig = hw.content;

  // DOM으로 직접 생성
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;align-items:center;gap:6px;flex:1;';

  const input = document.createElement('input');
  input.type = 'text';
  input.value = orig;
  input.style.cssText = 'flex:1;padding:4px 10px;border:1.5px solid var(--mint);border-radius:99px;font-size:14px;font-family:inherit;font-weight:700;outline:none;';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-primary btn-sm';
  saveBtn.textContent = '저장';
  saveBtn.onclick = () => saveHomeworkEdit(id, input.value);

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn btn-ghost btn-sm';
  cancelBtn.textContent = '취소';
  cancelBtn.onclick = () => { titleEl.textContent = orig; };

  wrap.appendChild(input);
  wrap.appendChild(saveBtn);
  wrap.appendChild(cancelBtn);

  titleEl.textContent = '';
  titleEl.appendChild(wrap);

  input.focus();
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') saveHomeworkEdit(id, input.value);
    if (e.key === 'Escape') { titleEl.textContent = orig; }
  });
}

async function saveHomeworkEdit(id, value) {
  const newName = value.trim();
  if (!newName) return;
  dbUpdate(id, { content: newName });
  await dbSave();
  renderHomework();
  toast('✅ 수정되었습니다');
}

async function deleteHomework(id) {
  const hw = DB.find(d => d._id === id);
  if (!hw) return;
  DB = DB.filter(d => !(d.type === 'hw_check' && d.hw_id === hw.hw_id));
  dbDelete(id);
  await dbSave();
  renderHomework();
  toast('🗑 삭제되었습니다');
}

// 프레젠테이션
// ══════════════════════════════════════
function openPres(hwId, hwContent) {
  const checks = dbGet('hw_check', { hw_id: hwId });
  const doneIds = new Set(checks.filter(c => c.checked).map(c => c.student_id));
  const incomplete = STUDENTS.filter(s => !doneIds.has(s.id));

  document.getElementById('pres-hw').textContent = hwContent;
  const empty = document.getElementById('pres-empty');
  const grid = document.getElementById('pres-grid');

  if (!incomplete.length) {
    empty.style.display = 'block';
    grid.innerHTML = '';
  } else {
    empty.style.display = 'none';
    grid.innerHTML = incomplete.map(s => `
      <div class="pres-card" onclick="checkAndRemove('${hwId}', ${s.id}, '${s.name}', this)">
        <div class="pnum">${s.id}</div>
        <div class="pname">${s.name}</div>
      </div>`).join('');
  }
  document.getElementById('pres').classList.add('open');
}

function openAllPres() {
  const items = DB.filter(d => d.type === 'homework').sort((a, b) => a.date.localeCompare(b.date));
  if (!items.length) { toast('⚠ 등록된 숙제가 없습니다'); return; }

  document.getElementById('pres-hw').textContent = '숙제 안 한 사람';
  document.getElementById('pres-sub').textContent = '';
  document.getElementById('pres-empty').style.display = 'none';

  const grid = document.getElementById('pres-grid');
  grid.style.gridTemplateColumns = '1fr';
  grid.style.gap = '20px';

  document.getElementById('pres-hw').textContent = '숙제 안 한 사람';
  document.getElementById('pres-sub').textContent = '';
  document.getElementById('pres-empty').style.display = 'none';

  grid.style.gridTemplateColumns = '1fr';
  grid.style.gap = '16px';

  const rows = items.map(hw => {
    const checks = DB.filter(d => d.type === 'hw_check' && d.hw_id === hw.hw_id);
    const doneIds = new Set(checks.filter(c => c.checked).map(c => c.student_id));
    const incomplete = STUDENTS.filter(s => !doneIds.has(s.id));
    if (incomplete.length === 0) return ''; // 완료된 숙제는 표시 안 함

    return `<div style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:16px 20px;" id="allpres-${hw.hw_id}">
      <div style="font-size:22px;font-weight:900;color:white;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.2);">
        📚 ${hw.content}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">
        ${incomplete.map(s => `
          <div class="pres-card" style="padding:10px 14px;" onclick="checkAndRemove('${hw.hw_id}', ${s.id}, '${s.name}', this)">
            <div class="pnum">${s.id}</div>
            <div class="pname">${s.name}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  if (!rows.trim()) {
    document.getElementById('pres-empty').style.display = 'block';
    document.getElementById('pres-empty').textContent = '🎉 모든 숙제가 완료됐어요!';
  }
  grid.innerHTML = rows;
  document.getElementById('pres').classList.add('open');
}

async function checkAndRemove(hwId, sid, sname, card) {
  const studentId = Number(sid); // 숫자로 변환
  // 체크 처리
  const existing = DB.find(d => d.type === 'hw_check' && d.hw_id === hwId && d.student_id === studentId);
  if (!existing) {
    dbCreate({ type: 'hw_check', hw_id: hwId, student_id: studentId, student_name: sname, checked: true, date: todayWithDay() });
  } else {
    dbUpdate(existing._id, { checked: true });
  }
  await dbSave();

  // 숙제탭 즉시 업데이트
  updateHwCard(hwId);

  // 카드 애니메이션 후 제거
  card.classList.add('removing');
  setTimeout(() => {
    card.remove();
    // 해당 섹션에 남은 카드가 없으면 완료 메시지로 교체
    const section = document.getElementById('allpres-' + hwId);
    if (section) {
      const remaining = section.querySelectorAll('.pres-card');
      if (remaining.length === 0) {
        const cardArea = section.querySelector('div:last-child');
        if (cardArea) cardArea.innerHTML = '<div style="font-size:15px;font-weight:700;color:rgba(255,255,255,0.7);">✓ 모두 제출했어요!</div>';
      }
    } else {
      // 개별 PPT 모드
      const grid = document.getElementById('pres-grid');
      const remaining = grid.querySelectorAll('.pres-card');
      if (remaining.length === 0) {
        document.getElementById('pres-empty').style.display = 'block';
      }
    }
  }, 300);
}

function closePres() {
  const grid = document.getElementById('pres-grid');
  grid.style.gridTemplateColumns = '';
  grid.style.gap = '';
  document.getElementById('pres-sub').textContent = '숙제';
  document.getElementById('pres-notice').textContent = '';
  document.getElementById('pres').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePres(); });

let detailStudentId = null;

function renderReviewList() {
  const behaviors = dbGet('behavior');
  const counts = {};
  behaviors.forEach(b => { counts[b.student_id] = (counts[b.student_id] || 0) + 1; });

  document.getElementById('rv-grid').innerHTML = STUDENTS.map(s => {
    const cnt = counts[s.id] || 0;
    return `<button class="sbtn ${cnt > 0 ? 'has' : ''}" data-id="${s.id}" data-name="${s.name}" onclick="showDetail(${s.id})">
      <span class="snum">${s.id}번</span>
      <span class="sname">${s.name}</span>
      <span style="font-size:10px;opacity:${cnt > 0 ? '0.85' : '0.5'};">${cnt > 0 ? cnt + '건' : '없음'}</span>
    </button>`;

}

document.getElementById('rv-search').addEventListener('input', e => filterGrid('rv-grid', e.target.value.trim()));

function showDetail(sid) {
  detailStudentId = sid;
  const s = STUDENTS.find(x => x.id === sid);
  document.getElementById('rv-list').style.display = 'none';
  document.getElementById('rv-detail').style.display = 'block';
  document.getElementById('rv-name').textContent = `${s.id}번 ${s.name}`;

  renderDetailRecords();
}

function renderDetailRecords() {
  const recs = dbGet('behavior', { student_id: detailStudentId }).sort((a, b) => b.date.localeCompare(a.date));
  document.getElementById('rv-count').textContent = `${recs.length}건`;
  const container = document.getElementById('rv-records');
  if (!recs.length) {
    container.innerHTML = '<div class="empty" style="padding:20px 0;"><p>기록이 없습니다</p></div>';

  }
  container.innerHTML = recs.map(r => `
    <div class="rec-item">

      </button>
    </div>`).join('');
}

// ══════════════════════════════════════
// 학부모 상담 메모
// ══════════════════════════════════════
function loadConsultMemo() {
  if (!detailStudentId) return;
  const memo = DB.find(d => d.type === 'consult' && d.student_id === detailStudentId);
  document.getElementById('consult-memo').value = memo ? memo.content : '';
}

async function saveConsultMemo() {
  if (!detailStudentId) return;
  const content = document.getElementById('consult-memo').value;
  const existing = DB.find(d => d.type === 'consult' && d.student_id === detailStudentId);
  if (existing) {
    dbUpdate(existing._id, { content });
  } else {
    dbCreate({ type: 'consult', student_id: detailStudentId, content });
  }
  await dbSave();
  toast('✅ 상담 메모가 저장되었습니다');
}

async function deleteBehavior(id) {
  const rec = DB.find(d => d._id === id);
  if (!rec) return;
  dbDelete(id);
  await dbSave();
  renderDetailRecords();
  toast('🗑 삭제되었습니다');
}

function copyRecords() {
  const s = STUDENTS.find(x => x.id === detailStudentId);
  const recs = dbGet('behavior', { student_id: detailStudentId }).sort((a, b) => a.date.localeCompare(b.date));
  if (!recs.length) { toast('⚠ 복사할 기록이 없습니다'); return; }

  const lines = recs.map(r => r.date + ': ' + r.content).join('\n');
  const text = '[' + s.name + ' 행동 기록]\n' + lines;

  // textarea 방식으로 복사 (클립보드 API 대안)
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  const success = document.execCommand('copy');
  document.body.removeChild(ta);

  if (success) {
    const btn = document.getElementById('copy-btn');
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ 복사됨!';
    btn.style.color = 'var(--mint-dark)';
    btn.style.borderColor = 'var(--mint)';
    setTimeout(() => {
      btn.innerHTML = orig;
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 2000);
    toast('📋 복사되었습니다!');
  } else {
    toast('❌ 복사 실패 — 직접 선택해서 복사해주세요');
  }
}

function backToList() {
  document.getElementById('rv-list').style.display = 'block';
  document.getElementById('rv-detail').style.display = 'none';
  detailStudentId = null;
  renderReviewList();
}

// ══════════════════════════════════════
// AI 분석
// ══════════════════════════════════════
async function analyzeStudent() {
  if (!detailStudentId) return;
  const s = STUDENTS.find(x => x.id === detailStudentId);
  const recs = dbGet('behavior', { student_id: detailStudentId }).sort((a, b) => a.date.localeCompare(b.date));
  if (!recs.length) { toast('⚠ 분석할 기록이 없습니다'); return; }

  const btn = document.getElementById('ai-btn');
  const orig = btn.innerHTML;
  btn.innerHTML = '<span class="spin dark"></span>';
  btn.disabled = true;
  document.getElementById('ai-placeholder').style.display = 'none';
  document.getElementById('ai-result').style.display = 'block';
  document.getElementById('ai-text').textContent = '분석 중...';

  const recordText = recs.map(r => `[${r.date}] ${r.content}`).join('\n');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: `초등학교 학생 "${s.name}"의 행동 기록입니다:\n\n${recordText}\n\n다음을 따뜻하고 전문적인 교사의 시각으로 간결하게 작성해주세요:\n1. 주요 행동 패턴\n2. 긍정적인 면\n3. 개선이 필요한 부분\n4. 지도 방향 추천` }]
      })
    });
    const data = await res.json();
    document.getElementById('ai-text').textContent = data.content?.map(c => c.text || '').join('') || '분석 결과를 받지 못했습니다.';
  } catch {
    document.getElementById('ai-text').textContent = '분석 중 오류가 발생했습니다.';
  }
  btn.innerHTML = orig;
  btn.disabled = false;
}

// ══════════════════════════════════════
// 월별 현황
// ══════════════════════════════════════
function renderMonthly() {
  updateMonthSel();
  const sel = document.getElementById('month-sel').value;
  const body = document.getElementById('monthly-body');

  let items = dbGet('homework');
  if (sel) items = items.filter(h => h.date.startsWith(sel));
  items.sort((a, b) => a.date.localeCompare(b.date));

  if (!items.length) {
    body.innerHTML = '<div class="card"><div class="empty"><p>등록된 숙제가 없습니다</p></div></div>';
    return;
  }

  const matrix = {};
  STUDENTS.forEach(s => {
    matrix[s.id] = {};
    items.forEach(hw => {
      const c = DB.find(d => d.type === 'hw_check' && d.hw_id === hw.hw_id && d.student_id === s.id);
      matrix[s.id][hw.hw_id] = c?.checked || false;
    });
  });

  const rates = STUDENTS.map(s => {
    const done = items.filter(hw => matrix[s.id][hw.hw_id]).length;
    return { ...s, done, pct: items.length ? Math.round(done / items.length * 100) : 0 };
  });

  const perfect = rates.filter(r => r.pct === 100).length;
  const zero = rates.filter(r => r.pct === 0).length;

  body.innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
      <span class="chip chip-g">✅ 전체완료 ${perfect}명</span>
      <span class="chip chip-r">❌ 0% ${zero}명</span>
      <span class="chip chip-b">📝 숙제 ${items.length}개</span>
    </div>
    <div class="card" style="overflow:hidden;">
      <div style="overflow-x:auto;">
        <table class="mtable">
          <thead><tr>
            <th style="text-align:left;min-width:100px;">학생</th>
            ${items.map(hw => `<th style="min-width:88px;"><div>${hw.content}</div><div style="font-weight:400;color:#aaa;font-size:10px;">${hw.date}</div></th>`).join('')}
            <th style="min-width:80px;">완료율</th>
          </tr></thead>
          <tbody>
            ${rates.map((s, i) => `
              <tr style="${i % 2 ? 'background:#f8fdf9;' : ''}">
                <td style="background:${i % 2 ? '#f8fdf9' : 'white'} !important;">${s.id}. ${s.name}</td>
                ${items.map(hw => {
                  const ok = matrix[s.id][hw.hw_id];
                  return `<td><span class="ck ${ok ? 'ok' : 'no'}">${ok ? '✓' : '✗'}</span></td>`;
                }).join('')}
                <td>
                  <div style="display:flex;align-items:center;gap:5px;">
                    <div style="flex:1;height:4px;border-radius:99px;background:#e0e0e0;min-width:36px;">
                      <div style="width:${s.pct}%;height:100%;border-radius:99px;background:${s.pct===100?'var(--g1)':s.pct>=50?'#2980b9':'var(--red)'};"></div>
                    </div>
                    <span style="font-size:11px;font-weight:700;color:${s.pct===100?'var(--g1)':s.pct>=50?'#2980b9':'var(--red)'};">${s.pct}%</span>
                  </div>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function updateMonthSel() {
  const months = new Set();
  DB.forEach(d => { if (d.date) months.add(d.date.slice(0, 7)); });
  const sel = document.getElementById('month-sel');
  const cur = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  [...months].sort().reverse().forEach(m => {
    const opt = new Option(`${m.slice(0,4)}년 ${m.slice(5)}월`, m);
    sel.add(opt);
  });
  sel.value = cur;
}

// ══════════════════════════════════════
// 엑셀 내보내기
// ══════════════════════════════════════
function exportExcel() {
  const wb = XLSX.utils.book_new();

  // 행동 기록 시트
  const bRows = [['번호', '이름', '날짜', '내용']];
  dbGet('behavior').sort((a, b) => a.student_id - b.student_id || a.date.localeCompare(b.date))
    .forEach(r => bRows.push([r.student_id, r.student_name, r.date, r.content]));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(bRows), '행동기록');

  // 숙제 현황 시트
  const hws = dbGet('homework');
  if (hws.length) {
    const header = ['번호', '이름', ...hws.map(h => `${h.content}(${h.date})`), '완료율'];
    const rows = [header];
    STUDENTS.forEach(s => {
      const checks = hws.map(hw => {
        const c = DB.find(d => d.type === 'hw_check' && d.hw_id === hw.hw_id && d.student_id === s.id);
        return c?.checked ? 'O' : 'X';
      });
      const done = checks.filter(c => c === 'O').length;
      rows.push([s.id, s.name, ...checks, `${Math.round(done / hws.length * 100)}%`]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), '숙제현황');
  }

  XLSX.writeFile(wb, `학생관리_${today()}.xlsx`);
  toast('📊 엑셀 파일이 다운로드되었습니다');
}
